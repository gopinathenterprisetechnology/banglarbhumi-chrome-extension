<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Banglarbhumi Auto Sync Paper</title>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: Arial, sans-serif; width: 780px; margin: 10px; background-color: #f1f3f6; color: #333; }
        .control-panel { background: #ffffff; padding: 15px; border: 1px solid #b3d7ff; margin-bottom: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .upload-box { font-size: 13px; font-weight: bold; }
        .action-btns { display: flex; gap: 8px; }
        
        .btn { color: white; padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-download { background: #28a745; }
        .btn-download:hover { background: #218838; }
        .btn-print { background: #007bff; }
        .btn-print:hover { background: #0069d9; }
        
        /* প্রিন্ট পেপার ও অটো-লেআউট রিসেট */
        .paper-container { background: white; padding: 25px; border: 1px solid #ccc; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .banner-wrapper { width: 100%; text-align: center; margin-bottom: 20px; }
        #uploaded-img { width: 100%; height: auto; max-height: 250px; object-fit: contain; display: none; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* বাংলারভূমি স্টাইল শিট ওভাররাইড */
        .scraped-content table { width: 100% !important; border-collapse: collapse !important; margin-top: 15px !important; table-layout: fixed !important; word-wrap: break-word !important; }
        .scraped-content th, .scraped-content td { border: 1px solid #888 !important; padding: 10px !important; text-align: left !important; color: #000 !important; font-size: 13px !important; position: relative; }
        .scraped-content th { background-color: #f4f4f4 !important; font-weight: bold !important; }
        
        /* স্মার্ট ডিলিট বাটন এফেক্ট */
        .scraped-content tr:hover, .scraped-content p:hover, .scraped-content div:hover { background-color: #fff1f0 !important; }
        .delete-btn-cell { display: none; position: absolute; top: 4px; right: 4px; background: #dc3545; color: white; border: none; border-radius: 3px; font-size: 11px; padding: 3px 6px; cursor: pointer; z-index: 100; font-family: Arial, sans-serif; }
        .scraped-content tr:hover .delete-btn-cell, .scraped-content p:hover .delete-btn-cell, .scraped-content div:hover .delete-btn-cell { display: block; }
        
        @media print {
            .control-panel, .delete-btn-cell { display: none !important; }
            body { margin: 0; background: white; width: 100%; }
            .paper-container { border: none; box-shadow: none; padding: 0; }
            .scraped-content tr:hover { background-color: transparent !important; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="upload-box">
            <label style="color: #0056b3; display: block; margin-bottom: 5px;">পেজের মাথায় বড় ইমেজ যোগ করুন (JPG):</label>
            <input type="file" id="img-input" accept="image/jpeg, image/jpg">
        </div>
        <div class="action-btns">
            <button id="print-btn" class="btn btn-print">সরাসরি প্রিন্ট করুন</button>
            <button id="download-btn" class="btn btn-download">PDF ডাউনলোড</button>
        </div>
    </div>

    <div id="print-area" class="paper-container">
        <div class="banner-wrapper">
            <img id="uploaded-img" src="" alt="Uploaded Header Banner">
        </div>
        
        <!-- লাইভ সিঙ্ক হওয়া টেক্সট বা টেবিল এখানে অটোমেটিক বসবে এবং টাইপ করা যাবে -->
        <div id="live-content" class="scraped-content" contenteditable="true">
            <p style="color: #666; text-align: center; padding: 30px; font-size: 14px;">বাংলারভূমি পেজের সিকিউরড তথ্য ডাইরেক্ট সিঙ্ক করার চেষ্টা করা হচ্ছে...</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
