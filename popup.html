<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Banglarbhumi Live Paper</title>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: Arial, sans-serif; width: 750px; margin: 10px; background-color: #f1f3f6; }
        .control-panel { background: #e6f2ff; padding: 15px; border: 1px solid #b3d7ff; margin-bottom: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .upload-box { font-size: 13px; font-weight: bold; }
        .paper-container { background: white; padding: 25px; border: 1px solid #ccc; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn:hover { background: #218838; }
        
        /* পেজের মাথায় বড় ইমেজের জন্য নিখুঁত স্টাইল */
        .banner-wrapper { width: 100%; text-align: center; margin-bottom: 20px; }
        #uploaded-img { width: 100%; height: auto; max-height: 250px; object-fit: contain; display: none; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* লাইভ টেবিলের বাংলারভূমি স্টাইল */
        .scraped-content table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .scraped-content th, .scraped-content td { border: 1px solid #999; padding: 8px; text-align: left; }
        .scraped-content th { background-color: #f4f4f4; font-weight: bold; }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="upload-box">
            <label style="color: #0056b3; display: block; margin-bottom: 5px;">পেজের মাথায় বড় ইমেজ যোগ করুন (JPG):</label>
            <input type="file" id="img-input" accept="image/jpeg, image/jpg">
        </div>
        <button id="download-btn" class="btn">PDF ডাউনলোড করুন</button>
    </div>

    <!-- এই পুরো ফ্রেমে যা থাকবে সব পিডিএফে কনভার্ট হবে -->
    <div id="print-area" class="paper-container">
        
        <!-- আপলোড করা বড় ইমেজটি এখানে বসবে -->
        <div class="banner-wrapper">
            <img id="uploaded-img" src="" alt="Uploaded Header Banner">
        </div>
        
        <!-- লাইভ ডেটা এখানে এসে ইনসার্ট হবে -->
        <div id="live-content" class="scraped-content">
            <p style="color: #666; text-align: center; padding: 30px; font-size: 14px;">বাংলারভূমি পোর্টালটি ওপেন করে তথ্য সার্চ করার পর এই এক্সটেনশনটি খুলুন...</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
