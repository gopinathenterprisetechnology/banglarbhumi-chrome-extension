<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Banglarbhumi Full Tab Editor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f1f3f6; margin: 0; padding: 20px; color: #333; }
        .control-panel { background: #ffffff; padding: 15px; border: 1px solid #b3d7ff; margin-bottom: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 850px; margin-left: auto; margin-right: auto; }
        .upload-box { font-size: 13px; font-weight: bold; }
        
        .btn { color: white; padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-print { background: #007bff; }
        .btn-print:hover { background: #0069d9; }
        
        /* প্রফেশনাল প্রিন্ট পেপার ও স্ক্রোলবার ব্রেকার */
        .paper-container { background: white; padding: 40px; border: 1px solid #ccc; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 850px; margin-left: auto; margin-right: auto; min-height: 500px; position: relative; box-sizing: border-box; }
        .banner-wrapper { width: 100%; text-align: center; margin-bottom: 20px; }
        #uploaded-img { width: 100%; height: auto; max-height: 250px; display: none; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* লাইভ টেবিল ওভাররাইড - স্ক্রোলবার মুক্ত মাল্টি পেজ লেআউট */
        .scraped-content, .bb-table-wrapper, .scraped-content div, .scraped-content section {
            height: auto !important;
            max-height: none !important;
            overflow: visible !important;
        }
        .scraped-content table { width: 100% !important; border-collapse: collapse !important; margin-top: 15px !important; table-layout: fixed !important; word-wrap: break-word !important; height: auto !important; }
        .scraped-content th, .scraped-content td { border: 1px solid #888 !important; padding: 10px !important; text-align: left !important; color: #000 !important; font-size: 13px !important; position: relative; }
        .scraped-content th { background-color: #f4f4f4 !important; font-weight: bold !important; }
        
        /* স্মার্ট ডিলিট অপশন */
        .scraped-content tr:hover, .scraped-content p:hover { background-color: #fff1f0 !important; }
        .delete-btn-cell { display: none; position: absolute; top: 4px; right: 4px; background: #dc3545; color: white; border: none; border-radius: 3px; font-size: 11px; padding: 3px 6px; cursor: pointer; z-index: 100; }
        .scraped-content tr:hover .delete-btn-cell, .scraped-content p:hover .delete-btn-cell { display: block; }
        
        /* প্রিন্ট কমান্ড ট্রিগার হলে সিস্টেম লেআউট */
        @media print {
            .control-panel, .delete-btn-cell { display: none !important; }
            body { margin: 0; padding: 0; background: white; }
            .paper-container { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .scraped-content tr:hover { background-color: transparent !important; }
            
            /* ২য় পেজে ডাটা পাঠানোর অটোমেশন */
            .scraped-content tr { page-break-inside: avoid !important; break-inside: avoid !important; }
            .scraped-content table { page-break-after: auto !important; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="upload-box">
            <label style="color: #0056b3; display: block; margin-bottom: 5px;">পেজের মাথায় বড় ইমেজ যোগ করুন (JPG):</label>
            <input type="file" id="img-input" accept="image/jpeg, image/jpg">
        </div>
        <button id="print-btn" class="btn btn-print">সরাসরি প্রিন্ট / PDF ডাউনলোড</button>
    </div>

    <div id="print-area" class="paper-container">
        <div class="banner-wrapper">
            <img id="uploaded-img" src="" alt="Uploaded Header Banner">
        </div>
        
        <div id="live-content" class="scraped-content" contenteditable="true">
            <!-- অটো সিঙ্ক হওয়া কন্টেন্ট এখানে এসে লোড হবে -->
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
